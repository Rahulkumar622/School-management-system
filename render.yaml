services:
  - type: web
    name: school-management-system
    runtime: docker
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: PORT
        value: "10000"
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: "3306"
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: DB_NAME
        sync: false
      - key: DB_SSL
        value: "false"
      - key: DB_CONNECTION_LIMIT
        value: "10"
      - key: CLIENT_URL
        sync: false
      - key: ADMIN_EMAIL
        value: "admin@gmail.com"
      - key: ADMIN_PASSWORD
        sync: false
      - key: JWT_SECRET
        sync: false
